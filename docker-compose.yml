services:
  db:
    image: mysql:8.0
    container_name: app_db
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  backend:
    build:
      context: ./evidencije_laravel
      dockerfile: Dockerfile
    container_name: app_laravel
    working_dir: /var/www
    volumes:
      - ./evidencije_laravel:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./evidencije_laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  front:
    build:
      context: ./evidencije_react
      dockerfile: Dockerfile
    container_name: app_front
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_BASE_URL: http://127.0.0.1:8080/api
    command: sh -c "npm install && npm start"
    volumes:
      - ./evidencije_react:/app
      - react_node_modules:/app/node_modules


volumes:
  dbdata:
  react_node_modules: